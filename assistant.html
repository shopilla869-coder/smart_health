<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - Smart Health</title>
    <link rel="stylesheet" href="main.css?v=999">
</head>
<body>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="assistant.html">المساعد الذكي</a>
        <a href="tips.html">نصائح صحية</a>
        <a href="emergecy.html">الطوارئ</a>
    </nav>

    <div class="container">
        <img src="tips.jpg" alt="Smart Assistant Hero" class="banner">
        
        <h1>Smart Assistant</h1>
        <p>كيف يمكننا مساعدتك اليوم؟</p>

        <div class="search-area">
            <h3>🩺 فحص الأعراض السريع</h3>
            <p>اكتبي ما تشعرين به (مثلاً: صداع، تعب، مغص، كحة)</p>
            
            <input type="text" id="userInput" placeholder="بتحسي بإيه؟">
            <br>
            <button onclick="getResponse()">افحصي الآن</button>

            <div id="response"></div>
        </div>
    </div>

    <script>
    function getResponse() {
        let input = document.getElementById("userInput").value;
        let output = document.getElementById("response");

        // تنسيق المربع اللي هيظهر فيه الرد
        let style = "background: #e1f5fe; padding: 15px; border-radius: 10px; border-right: 5px solid #007bff; margin-top: 20px; text-align: right; color: #2c3e50; direction: rtl; line-height: 1.6;";

        let result = "";

        // 1. الصداع
        if (input.includes("صداع")) {
            result = "🔍 <b>التشخيص:</b> إجهاد أو نقص سوائل.<br>✅ <b>العلاج:</b> راحة في مكان هادئ وشرب مياه كافية.<br>💊 <b>الدواء:</b> بنادول (عند اللزوم).";
        } 
        // 2. السخونية
        else if (input.includes("سخونية") || input.includes("حرارة")) {
            result = "🔍 <b>التشخيص:</b> ارتفاع في حرارة الجسم.<br>✅ <b>العلاج:</b> كمادات مياه فاترة وسوائل كثيرة.<br>💊 <b>الدواء:</b> باراسيتامول خافض للحرارة.";
        } 
        // 3. المغص
        else if (input.includes("مغص") || input.includes("وجع بطن")) {
            result = "🔍 <b>التشخيص:</b> تقلصات معوية بسيطة.<br>✅ <b>العلاج:</b> مشروبات دافئة مثل النعناع أو اليانسون.<br>💊 <b>الدواء:</b> بسكوبان للتقلصات.";
        }
        // 4. الكحة
        else if (input.includes("كحة") || input.includes("سعال")) {
            result = "🔍 <b>التشخيص:</b> تهيج في الجهاز التنفسي.<br>✅ <b>العلاج:</b> شرب ملعقة عسل وسوائل دافئة.<br>💊 <b>الدواء:</b> شراب أوبلكس مهدئ للسعال.";
        }
        // 5. الحموضة
        else if (input.includes("حموضة") || input.includes("حرقان")) {
            result = "🔍 <b>التشخيص:</b> زيادة في حمض المعدة.<br>✅ <b>العلاج:</b> تجنب الأكل الحار أو الدسم قبل النوم.<br>💊 <b>الدواء:</b> جافيسكون أو فوار فواكه.";}
        // 6. البرد
        else if (input.includes("برد") || input.includes("زكام")) {
            result = "🔍 <b>التشخيص:</b> نزلة برد فيروسية.<br>✅ <b>العلاج:</b> راحة تامة وتناول حمضيات (فيتامين C).<br>💊 <b>الدواء:</b> كونجستال للبرد والرشح.";
        }
        // 7. التعب
        else if (input.includes("تعب") || input.includes("إرهاق")) {
            result = "🔍 <b>التشخيص:</b> إجهاد بدني عام ونقص طاقة.<br>✅ <b>العلاج:</b> النوم الكافي (8 ساعات) وتناول غذاء متوازن.<br>💊 <b>الدواء:</b> فيتامينات عامة لتعويض النقص.";
        }
        else {
            output.setAttribute("style", ""); 
            output.innerHTML = "<p style='color:red;'>أرجو إدخال عرض واضح (مثلاً: تعب، صداع، مغص) لنتمكن من مساعدتك.</p>";
            return;
        }

        // إظهار النتيجة في المربع الأزرق
        output.setAttribute("style", style);
        output.innerHTML = result;
    }
    </script>
</body>
</html>
